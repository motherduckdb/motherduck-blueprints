name: Deploy Dives

permissions:
  pull-requests: write
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "dives/**"
      - "scripts/deploy-dive.sh"
      - ".github/workflows/deploy_dives.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "dives/**"
      - "scripts/deploy-dive.sh"
      - ".github/workflows/deploy_dives.yaml"

jobs:
  compute_changes:
    name: Identify Changed Dives
    runs-on: ubuntu-latest
    outputs:
      changed_dives: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          token: ""
          base: main
          filters: |
            # Register each dive folder here. The key must match dives/<key>/.
            # standalone-dive: dives/standalone-dive/**
            __no_registered_dives: .github/never-match/**

  deploy:
    name: Deploy Dives
    needs: compute_changes
    if: github.ref == 'refs/heads/main' && needs.compute_changes.outputs.changed_dives != '[]'
    runs-on: ubuntu-latest
    environment: motherduck-production
    steps:
      - uses: actions/checkout@v4
      - uses: opt-nc/setup-duckdb-action@v1.2.8
        with:
          version: v1.5.3
      - name: Deploy changed dives
        shell: bash
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          for d in $(jq -r '.[]' <<< '${{ needs.compute_changes.outputs.changed_dives }}'); do
            echo "Deploying ${d}..."
            ./scripts/deploy-dive.sh "$d"
          done

  deploy-preview:
    name: Deploy Dives for Preview
    needs: compute_changes
    if: github.event_name == 'pull_request' && needs.compute_changes.outputs.changed_dives != '[]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opt-nc/setup-duckdb-action@v1.2.8
        with:
          version: v1.5.3
      - name: Deploy preview dives
        id: deploy-preview
        shell: bash
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          PREVIEW_BRANCH: ${{ github.head_ref }}
        run: |
          COMMENT_BODY=""
          for d in $(jq -r '.[]' <<< '${{ needs.compute_changes.outputs.changed_dives }}'); do
            echo "Deploying preview for ${d}..."
            COMMENT_BODY="${COMMENT_BODY}$(./scripts/deploy-dive.sh "$d")"$'\n'
          done
          echo "comment_body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMENT_BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- preview-dives-comment -->';
            const body = `${marker}
            ### Preview Dives

            | Dive | Link |
            |------|------|
            ${{ steps.deploy-preview.outputs.comment_body }}`.replace(/^ +/gm, '');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

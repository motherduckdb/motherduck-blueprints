name: Deploy Bundles

permissions:
  contents: read
  pull-requests: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "bundles/**"
      - "flights/**"
      - "dives/**"
      - "scripts/deploy-bundle.sh"
      - "scripts/validate-bundle.sh"
      - "scripts/cleanup-preview-bundle.sh"
      - "scripts/deploy-flight.sh"
      - "scripts/deploy-dive.sh"
      - "scripts/validate-flight.sh"
      - ".github/workflows/deploy_bundles.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "bundles/**"
      - "flights/**"
      - "dives/**"
      - "scripts/deploy-bundle.sh"
      - "scripts/validate-bundle.sh"
      - "scripts/cleanup-preview-bundle.sh"
      - "scripts/deploy-flight.sh"
      - "scripts/deploy-dive.sh"
      - "scripts/validate-flight.sh"
      - ".github/workflows/deploy_bundles.yaml"

jobs:
  compute_changes:
    name: Identify Changed Bundles
    runs-on: ubuntu-latest
    outputs:
      changed_bundles: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          token: ""
          base: main
          filters: |
            # Register each bundle and every asset path it orchestrates here.
            wikipedia-pageviews:
              - bundles/wikipedia-pageviews/**
              - flights/wikipedia-pageviews/**
              - dives/wikipedia-pageviews/**
              - scripts/deploy-bundle.sh
              - scripts/validate-bundle.sh
              - scripts/deploy-flight.sh
              - scripts/deploy-dive.sh
              - scripts/validate-flight.sh
            __no_registered_bundles: .github/never-match/**

  validate:
    name: Validate Bundles
    needs: compute_changes
    if: github.event_name == 'pull_request' && needs.compute_changes.outputs.changed_bundles != '[]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate changed bundles
        shell: bash
        run: |
          for b in $(jq -r '.[]' <<< '${{ needs.compute_changes.outputs.changed_bundles }}'); do
            echo "Validating bundle ${b}..."
            ./scripts/validate-bundle.sh "$b"
          done

  deploy-preview:
    name: Deploy Preview Bundles
    needs:
      - compute_changes
      - validate
    if: github.event_name == 'pull_request' && needs.compute_changes.outputs.changed_bundles != '[]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opt-nc/setup-duckdb-action@v1.2.8
        with:
          version: v1.5.3
      - name: Deploy preview bundles
        id: deploy-preview
        shell: bash
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          PREVIEW_BRANCH: ${{ github.head_ref }}
        run: |
          COMMENT_BODY=""
          for b in $(jq -r '.[]' <<< '${{ needs.compute_changes.outputs.changed_bundles }}'); do
            echo "Deploying preview bundle ${b}..."
            OUTPUT="$(./scripts/deploy-bundle.sh "$b")"
            if [ -n "$OUTPUT" ]; then
              COMMENT_BODY="${COMMENT_BODY}${OUTPUT}"$'\n'
            fi
          done
          echo "comment_body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMENT_BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Comment on PR
        if: steps.deploy-preview.outputs.comment_body != ''
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- preview-bundles-comment -->';
            const body = `${marker}
            ### Preview Bundles

            ${{ steps.deploy-preview.outputs.comment_body }}`.replace(/^ +/gm, '');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  deploy:
    name: Deploy Bundles
    needs: compute_changes
    if: github.ref == 'refs/heads/main' && needs.compute_changes.outputs.changed_bundles != '[]'
    runs-on: ubuntu-latest
    environment: motherduck-production
    steps:
      - uses: actions/checkout@v4
      - uses: opt-nc/setup-duckdb-action@v1.2.8
        with:
          version: v1.5.3
      - name: Deploy changed bundles
        shell: bash
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          for b in $(jq -r '.[]' <<< '${{ needs.compute_changes.outputs.changed_bundles }}'); do
            echo "Deploying bundle ${b}..."
            ./scripts/deploy-bundle.sh "$b"
          done


name: Deploy Flights

permissions:
  contents: read
  pull-requests: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "flights/**"
      - "scripts/deploy-flight.sh"
      - "scripts/validate-flight.sh"
      - "scripts/cleanup-preview-flight.sh"
      - ".github/workflows/deploy_flights.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "flights/**"
      - "scripts/deploy-flight.sh"
      - "scripts/validate-flight.sh"
      - "scripts/cleanup-preview-flight.sh"
      - ".github/workflows/deploy_flights.yaml"

jobs:
  compute_changes:
    name: Identify Changed Flights
    runs-on: ubuntu-latest
    outputs:
      changed_flights: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          token: ""
          base: main
          filters: |
            # Register each flight folder here. The key must match flights/<key>/.
            # standalone-flight: flights/standalone-flight/**
            __no_registered_flights: .github/never-match/**

  validate:
    name: Validate Flights
    needs: compute_changes
    if: github.event_name == 'pull_request' && needs.compute_changes.outputs.changed_flights != '[]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate changed flights
        shell: bash
        run: |
          for f in $(jq -r '.[]' <<< '${{ needs.compute_changes.outputs.changed_flights }}'); do
            echo "Validating ${f}..."
            ./scripts/validate-flight.sh "$f"
          done

  deploy-preview:
    name: Deploy Preview Flights
    needs:
      - compute_changes
      - validate
    if: github.event_name == 'pull_request' && needs.compute_changes.outputs.changed_flights != '[]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opt-nc/setup-duckdb-action@v1.2.8
        with:
          version: v1.5.3
      - name: Deploy preview flights
        id: deploy-preview
        shell: bash
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          PREVIEW_BRANCH: ${{ github.head_ref }}
        run: |
          COMMENT_BODY=""
          for f in $(jq -r '.[]' <<< '${{ needs.compute_changes.outputs.changed_flights }}'); do
            echo "Deploying preview for ${f}..."
            OUTPUT="$(./scripts/deploy-flight.sh "$f")"
            if [ -n "$OUTPUT" ]; then
              COMMENT_BODY="${COMMENT_BODY}${OUTPUT}"$'\n'
            fi
          done
          echo "comment_body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMENT_BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Comment on PR
        if: steps.deploy-preview.outputs.comment_body != ''
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- preview-flights-comment -->';
            const body = `${marker}
            ### Preview Flights

            | Flight | ID | Run started | Share |
            |--------|----|-------------|-------|
            ${{ steps.deploy-preview.outputs.comment_body }}`.replace(/^ +/gm, '');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  deploy:
    name: Deploy Flights
    needs: compute_changes
    if: github.ref == 'refs/heads/main' && needs.compute_changes.outputs.changed_flights != '[]'
    runs-on: ubuntu-latest
    environment: motherduck-production
    steps:
      - uses: actions/checkout@v4
      - uses: opt-nc/setup-duckdb-action@v1.2.8
        with:
          version: v1.5.3
      - name: Deploy changed flights
        shell: bash
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          for f in $(jq -r '.[]' <<< '${{ needs.compute_changes.outputs.changed_flights }}'); do
            echo "Deploying ${f}..."
            ./scripts/deploy-flight.sh "$f"
          done

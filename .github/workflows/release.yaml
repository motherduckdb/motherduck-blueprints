name: Release Package Artifacts

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check release version
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            ./scripts/check-release-version.sh "${GITHUB_REF_NAME}"
            echo "EXPECTED_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            ./scripts/check-release-version.sh
          fi

      - name: Build and smoke test package
        run: ./scripts/package-smoke-test.sh dist

      - name: Smoke test local action
        uses: ./
        with:
          command: validate

      - uses: actions/upload-artifact@v4
        with:
          name: md-blueprints-dist
          path: dist/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* \
              --verify-tag \
              --title "$tag" \
              --notes "md-blueprints package artifacts for ${tag}."
          fi

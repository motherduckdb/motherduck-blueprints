name: Release Package Artifacts

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build Release Artifacts
    if: github.repository == 'motherduckdb/motherduck-blueprints'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Check release version
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            ./scripts/check-release-version.sh "${GITHUB_REF_NAME}"
            echo "EXPECTED_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            ./scripts/check-release-version.sh
          fi

      - name: Build and smoke test package
        run: ./scripts/package-smoke-test.sh dist

      - name: Smoke test local action
        uses: ./
        with:
          command: validate

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: md-blueprints-dist
          path: dist/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* \
              --verify-tag \
              --title "$tag" \
              --notes "md-blueprints package artifacts for ${tag}."
          fi

      - name: Update floating major tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          major="v$(echo "${GITHUB_REF_NAME#v}" | cut -d. -f1)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$major" "$GITHUB_SHA"
          git push -f origin "$major"

  release-preflight:
    name: Verify External Release Setup
    needs: build
    if: github.repository == 'motherduckdb/motherduck-blueprints' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check PyPI and generated-template publishing setup
        env:
          TEMPLATE_PUSH_TOKEN: ${{ secrets.BLUEPRINTS_TEMPLATE_PUSH_TOKEN }}
          TEMPLATE_REPOSITORY: motherduckdb/blueprints-template
          PYPI_PROJECT: md-blueprints
        run: ./scripts/check-release-external-setup.sh

  publish-pypi:
    name: Publish PyPI Package
    needs:
      - build
      - release-preflight
    if: github.repository == 'motherduckdb/motherduck-blueprints' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: md-blueprints-dist
          path: dist

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  publish-template:
    name: Publish Generated Template Repository
    needs:
      - build
      - release-preflight
    if: github.repository == 'motherduckdb/motherduck-blueprints' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: md-blueprints-dist
          path: dist

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Generate template repository
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install dist/md_blueprints-*.whl
          md-blueprints init generated-template

      - name: Publish generated template repository
        env:
          TEMPLATE_PUSH_TOKEN: ${{ secrets.BLUEPRINTS_TEMPLATE_PUSH_TOKEN }}
          TEMPLATE_REPOSITORY: motherduckdb/blueprints-template
        run: |
          set -euo pipefail
          if [ -z "$TEMPLATE_PUSH_TOKEN" ]; then
            echo "BLUEPRINTS_TEMPLATE_PUSH_TOKEN is not configured; cannot publish generated template." >&2
            exit 1
          fi

          # Keep the template repository's history so customers who created
          # repos from it can diff releases, and tag each release so upgrades
          # have stable reference points.
          git clone "https://x-access-token:${TEMPLATE_PUSH_TOKEN}@github.com/${TEMPLATE_REPOSITORY}.git" template-checkout
          cd template-checkout
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          find . -mindepth 1 -maxdepth 1 -not -name .git -exec rm -rf {} +
          cp -R ../generated-template/. .

          git add -A
          if git diff --cached --quiet; then
            echo "Template contents unchanged for ${GITHUB_REF_NAME}; tagging current commit."
          else
            git commit -m "Generate template for ${GITHUB_REF_NAME}"
          fi
          git tag -f "${GITHUB_REF_NAME}"
          git push origin HEAD:main
          git push -f origin "refs/tags/${GITHUB_REF_NAME}"

      - name: Publish template release notes
        env:
          GH_TOKEN: ${{ secrets.BLUEPRINTS_TEMPLATE_PUSH_TOKEN }}
          TEMPLATE_REPOSITORY: motherduckdb/blueprints-template
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          notes="Template generated by md-blueprints ${tag#v}. See the [${tag} changelog](https://github.com/${GITHUB_REPOSITORY}/releases/tag/${tag}) for what changed."
          if gh release view "$tag" -R "$TEMPLATE_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$tag" -R "$TEMPLATE_REPOSITORY" --notes "$notes"
          elif ! gh release create "$tag" -R "$TEMPLATE_REPOSITORY" --verify-tag --title "$tag" --notes "$notes"; then
            echo "::warning::Could not create a release on ${TEMPLATE_REPOSITORY}; the tag ${tag} was still pushed."
          fi

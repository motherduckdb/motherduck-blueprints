name: CI

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "motherduck.yml"
      - "Makefile"
      - "blueprints/**"
      - "schemas/**"
      - "src/**"
      - "tools/**"
      - "scripts/**"
      - "templates/**"
      - "action.yml"
      - "pyproject.toml"
      - ".dive-preview/**"
      - ".github/workflows/*.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "motherduck.yml"
      - "Makefile"
      - "blueprints/**"
      - "schemas/**"
      - "src/**"
      - "tools/**"
      - "scripts/**"
      - "templates/**"
      - "action.yml"
      - "pyproject.toml"
      - ".dive-preview/**"
      - ".github/workflows/*.yaml"

jobs:
  checks:
    name: Validate and Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install md-blueprints package
        run: python -m pip install -e .

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: .dive-preview/package-lock.json

      - name: Validate manifests
        run: make validate

      - name: Run mock deployment tests
        run: make mock-test

      - name: Build included example Dive
        run: make preview-smoke wikipedia-pageviews

      - name: Create and destroy generated example
        run: make example-smoke

  package:
    name: Package CLI and Action
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check package version metadata
        run: ./scripts/check-release-version.sh

      - name: Build and smoke test package
        run: ./scripts/package-smoke-test.sh dist

      - name: Smoke test local action
        uses: ./
        with:
          command: validate

      - uses: actions/upload-artifact@v4
        with:
          name: md-blueprints-dist
          path: dist/*

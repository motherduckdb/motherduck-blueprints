name: CI

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "motherduck.yml"
      - "Makefile"
      - "blueprints/**"
      - "schemas/**"
      - "src/**"
      - "tools/**"
      - "scripts/**"
      - "templates/**"
      - "action.yml"
      - "pyproject.toml"
      - ".dive-preview/**"
      - ".github/workflows/*.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "motherduck.yml"
      - "Makefile"
      - "blueprints/**"
      - "schemas/**"
      - "src/**"
      - "tools/**"
      - "scripts/**"
      - "templates/**"
      - "action.yml"
      - "pyproject.toml"
      - ".dive-preview/**"
      - ".github/workflows/*.yaml"

jobs:
  checks:
    name: Validate and Smoke Test
    if: github.repository == 'motherduckdb/motherduck-blueprints'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install md-blueprints package
        run: python -m pip install -e .[dev]

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: .dive-preview/package-lock.json

      - name: Validate manifests
        run: make validate

      - name: Run unit tests
        run: python -m pytest

      - name: Type-check package
        run: python -m mypy --strict src/md_blueprints

      - name: Run mock deployment tests
        run: make mock-test

      - name: Build included example Dive
        run: make preview-smoke wikipedia-pageviews

      - name: Create and destroy generated example
        run: make example-smoke

  package:
    name: Package CLI and Action
    if: github.repository == 'motherduckdb/motherduck-blueprints'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Check package version metadata
        run: ./scripts/check-release-version.sh

      - name: Build and smoke test package
        run: ./scripts/package-smoke-test.sh dist

      - name: Smoke test local action
        uses: ./
        with:
          command: validate

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: md-blueprints-dist
          path: dist/*

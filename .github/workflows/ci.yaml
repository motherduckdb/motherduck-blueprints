name: CI

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "motherduck.yml"
      - "Makefile"
      - "blueprints/**"
      - "schemas/**"
      - "src/**"
      - "tools/**"
      - "scripts/**"
      - "templates/**"
      - "action.yml"
      - "pyproject.toml"
      - ".dive-preview/**"
      - ".github/workflows/*.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "motherduck.yml"
      - "Makefile"
      - "blueprints/**"
      - "schemas/**"
      - "src/**"
      - "tools/**"
      - "scripts/**"
      - "templates/**"
      - "action.yml"
      - "pyproject.toml"
      - ".dive-preview/**"
      - ".github/workflows/*.yaml"

jobs:
  checks:
    name: Validate and Smoke Test
    if: github.repository == 'motherduckdb/motherduck-blueprints'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install md-blueprints package
        run: python -m pip install -e .[dev]

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: .dive-preview/package-lock.json

      - name: Validate manifests
        run: make validate

      - name: Run unit tests
        run: python -m pytest

      - name: Type-check package
        run: python -m mypy --strict src/md_blueprints

      - name: Run mock deployment tests
        run: make mock-test

      - name: Build included example Dive
        run: make preview-smoke wikipedia-pageviews

      - name: Create and destroy generated example
        run: make example-smoke

  package:
    name: Package CLI and Action
    if: github.repository == 'motherduckdb/motherduck-blueprints'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Check package version metadata
        run: ./scripts/check-release-version.sh

      - name: Build and smoke test package
        run: ./scripts/package-smoke-test.sh dist

      - name: Smoke test local action
        uses: ./
        with:
          command: validate

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: md-blueprints-dist
          path: dist/*

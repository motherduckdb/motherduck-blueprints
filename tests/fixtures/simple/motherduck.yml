schemaVersion: 1
repository:
  name: simple-fixture
include:
  - blueprints/*/blueprint.yml
variables:
  preview_suffix:
    default: _preview_${target.branch_slug}
targets:
  preview:
    mode: preview
    default: true
    deployment:
      tokenEnvVar: TARGET_MD_TOKEN
      identity: fixture preview service account
    policies:
      disableSchedules: true
      cleanup: true
      requireBranchSlugInDataResources: true
  prod:
    mode: production
    policies:
      serviceAccountRecommended: true
